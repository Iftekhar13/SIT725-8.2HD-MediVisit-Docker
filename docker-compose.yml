services:
  app:
    build: .
    container_name: medivisit-app
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/hospital_visitor_system
      JWT_SECRET: medivisit_docker_secret
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: medivisit-mongo
    ports:
      - "27017:27017"
    volumes:
      - medivisit_mongo_data:/data/db
    restart: unless-stopped

volumes:
  medivisit_mongo_data: